version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: job-agent-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/New_York
      - N8N_LOG_LEVEL=info
      - DB_TYPE=sqlite
      - DB_SQLITE_DATABASE=/home/node/.n8n/database.sqlite
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/import-workflows:ro
    networks:
      - job-agent

# The Node.js API service runs natively on Windows (not in Docker)
# because Playwright needs access to the local browser profile.
# Start it with: npm start

volumes:
  n8n_data:

networks:
  job-agent:
    driver: bridge
